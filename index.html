<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>webOS Video Call</title>
<style>
  html,body{margin:0;height:100%;background:#0f1115;color:#e8eaf0;
    font-family:-apple-system,Helvetica,Arial,sans-serif;overflow:hidden}
  #remote{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;background:#000}
  #local{position:absolute;right:10px;bottom:74px;width:140px;height:105px;object-fit:cover;
    background:#000;border:2px solid #2a2e37;border-radius:8px;z-index:2}
  #bar{position:absolute;left:0;bottom:0;width:100%;height:64px;background:rgba(16,18,24,.86);
    display:flex;align-items:center;justify-content:center;gap:12px;z-index:3}
  #status{position:absolute;top:0;left:0;width:100%;text-align:center;padding:10px 8px;
    font-size:15px;color:#e5c04f;background:rgba(16,18,24,.72);z-index:3}
  .btn{border:none;border-radius:24px;padding:11px 18px;font-size:15px;font-weight:600;color:#fff}
  #hang{background:#c0392b} #mute,#camoff,#dbgbtn{background:#333}
  #dbg{position:absolute;left:6px;bottom:70px;width:56%;max-height:44%;overflow:auto;z-index:4;
    font-family:monospace;font-size:11px;line-height:1.45;color:#8fe0a8;
    background:rgba(0,0,0,.6);border-radius:6px;padding:6px 8px;display:block;white-space:pre-wrap}
</style>
</head>
<body>
  <video id="remote" autoplay playsinline></video>
  <video id="local" autoplay playsinline muted></video>
  <div id="status">Starting…</div>
  <div id="dbg"></div>
  <div id="bar">
    <button id="mute" class="btn">Mute</button>
    <button id="camoff" class="btn">Camera</button>
    <button id="dbgbtn" class="btn">Log</button>
    <button id="hang" class="btn">Hang up</button>
  </div>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
(function(){
  var $ = function(id){ return document.getElementById(id); };
  var t0 = (typeof Date.now==="function") ? Date.now() : 0;
  function log(m){
    var d=$("dbg"); var s=(((typeof Date.now==="function"?Date.now():0)-t0)/1000).toFixed(1);
    d.textContent += "["+s+"s] "+m+"\n"; d.scrollTop=d.scrollHeight;
  }
  function status(t){ $("status").textContent=t; log("STATUS: "+t); }

  // --- Strip RTX (RTP retransmission) from SDP ---
  // This WPE/Atlas WebKit build can't packetize the "rtx" payload the peer offers:
  //   "RTP payloader not found for encoding rtx" -> "Unable to link packetizer to RTP funnel"
  // which makes the ENTIRE outgoing pipeline fail to link (capture-videosrc "not-linked") so the
  // TouchPad sends NO video (and no audio) at all. Removing rtx from local+remote SDP lets the
  // real h264/vp8 packetizer link. Cost: no RTP retransmission (fine on good/near networks).
  function stripRtx(sdp){
    if(!sdp || sdp.indexOf("rtx")<0) return sdp;
    var lines = sdp.split(/\r?\n/), rtx = {};
    lines.forEach(function(l){ var m=l.match(/^a=rtpmap:(\d+)\s+rtx\//i); if(m) rtx[m[1]]=1; });
    if(!Object.keys(rtx).length) return sdp;
    var out=[];
    lines.forEach(function(l){
      var m=l.match(/^a=(?:rtpmap|fmtp|rtcp-fb):(\d+)\b/i);
      if(m && rtx[m[1]]) return;                       // drop rtx payload's attribute lines
      if(/^m=(video|audio) /.test(l)){                 // remove rtx PTs from the m= line
        var p=l.split(" "); out.push(p.filter(function(x,i){ return i<3 || !rtx[x]; }).join(" ")); return;
      }
      out.push(l);
    });
    log("stripped rtx PTs: "+Object.keys(rtx).join(","));
    return out.join("\r\n");
  }
  // --- Force H.264-only for video ---
  // The TouchPad has a HARDWARE H.264 codec (omxh264dec/omxh264enc) but WebRTC keeps picking
  // software VP8 for send (~85% CPU at 640x480). Stripping VP8/VP9/AV1 from the video m-section
  // leaves H.264 as the only choice, so WebKit's webkitvideoencoder uses omxh264enc (HW) to send
  // and omxh264dec (HW) to receive. Default ON; disable at runtime with &h264=0 in the URL (escape
  // hatch if the HW encoder fails to link). Guarded: if the peer offered no H264, leave SDP alone.
  // Default OFF: the TouchPad's OMX H.264 *encoder* (omxh264enc) is unusable — gst-omx
  // gst_omx_video_enc_getcaps returns "Supported caps EMPTY" for OMX.qcom.video.encoder.avc, so
  // its packetizer never links ("Unable to link packetizer to RTP funnel") and forcing H264-only
  // kills outbound. So we let WebRTC pick VP8 (software) for SEND, while still HW-decoding the
  // peer's H.264 on RECEIVE. Opt in to the (currently broken) HW-encode path with &h264=1.
  var H264_ONLY = /[?&]h264=1/.test(location.search || "");
  function forceH264(sdp){
    if(!H264_ONLY || !sdp) return sdp;
    var lines = sdp.split(/\r?\n/), vStart=-1, vEnd=lines.length, i;
    for(i=0;i<lines.length;i++){
      if(/^m=video /.test(lines[i])){ vStart=i; }
      else if(vStart>=0 && i>vStart && /^m=/.test(lines[i])){ vEnd=i; break; }
    }
    if(vStart<0) return sdp;
    var keep={}, any=false;
    for(i=vStart;i<vEnd;i++){ var m=lines[i].match(/^a=rtpmap:(\d+)\s+H264\//i); if(m){ keep[m[1]]=1; any=true; } }
    if(!any) return sdp;                              // peer didn't offer H264 -> don't break the call
    var out=[];
    for(i=0;i<lines.length;i++){
      var l=lines[i];
      if(i>=vStart && i<vEnd){
        if(/^m=video /.test(l)){ var p=l.split(" "); out.push(p.filter(function(x,idx){return idx<3||keep[x];}).join(" ")); continue; }
        var am=l.match(/^a=(?:rtpmap|fmtp|rtcp-fb):(\d+)\b/i);
        if(am && !keep[am[1]]) continue;             // drop VP8/VP9/AV1/rtx/red/ulpfec attribute lines
      }
      out.push(l);
    }
    log("forced H264-only video (PTs "+Object.keys(keep).join(",")+")");
    return out.join("\r\n");
  }
  (function(){
    var RP = window.RTCPeerConnection || window.webkitRTCPeerConnection;
    if(!RP || !RP.prototype) return;
    ["setLocalDescription","setRemoteDescription"].forEach(function(fn){
      var orig = RP.prototype[fn];
      if(!orig) return;
      RP.prototype[fn] = function(desc){
        try { if(desc && desc.sdp){ desc = {type:desc.type, sdp:stripRtx(forceH264(desc.sdp))}; } } catch(e){}
        return orig.apply(this, [desc].concat([].slice.call(arguments,1)));
      };
    });
  })();

  // Atlas MODE-1 gives the page a tall (~3072px) render buffer, so height:100% / bottom:0 land far
  // below the visible screen (the WIDTH stays the real device width; only the height is buffered).
  // Clamp the whole UI to a fixed-size box over the visible screen: 768 tall in landscape, 1024 in portrait.
  // In the 3072px buffer, a fixed element's bottom:0 = BUFFER bottom (off-screen); an explicit
  // top: value is measured from the (visible) top. So position everything with top, from a hardcoded
  // TouchPad screen height (768 landscape / 1024 portrait). screen.* is unreliable (returns the buffer).
  function set(id, css){ var e=$(id); if(!e) return; for(var k in css){ e.style[k]=css[k]; } }
  function layout(){
    var iw = window.innerWidth || 1024;
    // WPE/Atlas reports window.orientation=0 even in landscape, which wrongly picks a 1024-tall
    // portrait layout and shoves the video/PiP to y~847, off the visible 768px screen. The tall
    // render buffer also makes innerHeight unreliable. Decide by width only: the buffer width ==
    // the real screen width (1024 landscape / 768 portrait on the TouchPad).
    var landscape = (iw >= 896);
    var W = (iw >= 320 && iw <= 1200) ? iw : (landscape ? 1024 : 768);
    var H = landscape ? 768 : 1024;
    var barH = 64, pip = 105;
    var key = W+"x"+H;
    if (key === layout._last) { return; }   // no change -> don't re-write styles (breaks any resize->layout loop)
    layout._last = key;
    document.documentElement.style.height = H+"px";
    var b = document.body;
    b.style.position="fixed"; b.style.top="0px"; b.style.left="0px";
    b.style.width=W+"px"; b.style.height=H+"px"; b.style.overflow="hidden";
    set("remote",{position:"fixed", top:"0px", left:"0px", width:W+"px", height:H+"px"});
    set("status",{position:"fixed", top:"0px", left:"0px", width:W+"px"});
    set("bar",   {position:"fixed", left:"0px", top:(H-barH)+"px", bottom:"auto", width:W+"px"});
    set("local", {position:"fixed", right:"10px", top:(H-barH-pip-8)+"px", bottom:"auto"});
    set("dbg",   {position:"fixed", left:"6px", top:"46px", bottom:"auto", maxHeight:(H-barH-56)+"px"});
    set("err",   {position:"fixed", top:Math.round(H*0.42)+"px"});
    log("layout W="+W+" H="+H+" "+(landscape?"landscape":"portrait")+" (iw="+iw+" screen="+screen.width+"x"+screen.height+")");
  }

  // Room: prefer ?room= (survives app launch); fall back to #hash; then a shared lobby.
  function getRoom(){
    var q = (location.search||"").match(/[?&]room=([^&]+)/);
    if (q) return decodeURIComponent(q[1]).replace(/[^a-zA-Z0-9]/g,"");
    var h = (location.hash||"").replace(/^#/,"").replace(/[^a-zA-Z0-9]/g,"");
    return h || "webosVClobby";
  }
  var room = getRoom();
  var HOST_ID = "webosvc-" + room + "-host";
  log("url=" + location.href);
  log("room=" + room + "  hostId=" + HOST_ID);

  var localStream=null, peer=null, activeCall=null, muted=false, camOff=false, connected=false, retryTimer=null, callAttempts=0;

  function watchIce(call){
    try {
      var pc = call.peerConnection;
      if (pc) pc.oniceconnectionstatechange = function(){ var st=pc.iceConnectionState; log("ICE: "+st); if(!connected){ status("Connecting… (ICE "+st+")"); } if(st==="failed"){ status("Media FAILED (ICE failed) — likely different networks / TURN blocked"); } };
    } catch(e){}
  }
  function playEl(el){
    try {
      var pr = el.play();
      if (pr && pr.catch) pr.catch(function(e){
        // Unmuted autoplay is blocked without a user gesture (WPE/Atlas + mobile browsers).
        // Fall back to MUTED autoplay (always allowed) so the picture shows immediately; a tap
        // then unmutes for audio. Without this the remote <video> paints nothing (blank/white).
        log(el.id+" play() blocked: "+e.name+" -> retrying muted");
        try { el.muted = true; el.play().then(function(){ if(el.id==="remote") status("Video playing (muted) — tap to unmute"); }).catch(function(e2){ log(el.id+" still blocked: "+e2.name); }); } catch(x){}
      });
    } catch(e){ log(el.id+" play err: "+e); }
  }
  function onStream(rs){
    var vt = rs.getVideoTracks ? rs.getVideoTracks() : [], at = rs.getAudioTracks ? rs.getAudioTracks() : [];
    log("remote stream: video="+vt.length+" audio="+at.length + (vt[0] ? (" enabled="+vt[0].enabled+" muted="+vt[0].muted+" state="+vt[0].readyState) : ""));
    connected=true; if(retryTimer){clearInterval(retryTimer);retryTimer=null;}
    var v = $("remote"); v.srcObject=rs;
    status("Connected — video="+vt.length+" audio="+at.length + (vt[0]&&vt[0].muted?" (video MUTED)":""));
    playEl(v);
    if (vt[0]) vt[0].onunmute = function(){ log("remote video unmuted"); playEl(v); };
  }
  // Cap the OUTBOUND encode with the FREE knobs only. The TouchPad camera (qcamsrc) is fixed at
  // NV12 640x480 — it can't capture QVGA — and the OMX HW encoder handles 640x480 natively at low
  // CPU, so we do NOT downscale: scaleResolutionDownBy would force a SOFTWARE videoscale, adding
  // CPU for no benefit. maxFramerate/maxBitrate cost nothing (the encoder just emits fewer/leaner
  // frames) and keep bandwidth sane on the 2011 hardware.
  function constrainSender(call){
    try {
      var pc = call && call.peerConnection;
      if (!pc || !pc.getSenders) return;
      pc.getSenders().forEach(function(s){
        if (!s.track || s.track.kind !== "video" || !s.getParameters) return;
        var p = s.getParameters();
        if (!p.encodings || !p.encodings.length) p.encodings = [{}];
        delete p.encodings[0].scaleResolutionDownBy;   // encode native 640x480 (no SW scale)
        p.encodings[0].maxFramerate = 15;
        p.encodings[0].maxBitrate = 600000;
        s.setParameters(p).then(function(){ log("sender capped: native 640x480, 15fps, 600kbps"); })
                          .catch(function(e){ log("setParameters failed: "+(e&&e.name||e)); });
      });
    } catch(e){ log("constrainSender err: "+e); }
  }
  function attach(call){
    activeCall=call; watchIce(call);
    call.on("stream", onStream);
    call.on("close", function(){ log("call closed"); if(!connected) status("Other side left."); });
    call.on("error", function(e){ log("call error: "+(e&&e.type||e)); });
    setTimeout(function(){ constrainSender(call); }, 1500);   // after senders exist
    setTimeout(function(){ constrainSender(call); }, 4000);   // retry once negotiated
  }

  function beHost(){
    status("Waiting for the other person to join…");
    log("hosting as " + HOST_ID);
    peer.on("call", function(call){ log("incoming call from "+call.peer); status("Someone joined — connecting media…");
      // If the guest retried, it opens a NEW incoming call each time. Close the previous one so the
      // host doesn't accumulate webrtcbins (thread exhaustion -> WebProcess abort on the TouchPad).
      if (activeCall && activeCall !== call){ try{activeCall.close();}catch(x){} }
      call.answer(localStream); attach(call); });
  }
  function callHost(){
    if (connected) return;
    // CRITICAL: close the previous call before making a new one. Each peer.call() creates a fresh
    // RTCPeerConnection (a gst webrtcbin, several threads). On the 2011 TouchPad, letting the 3s
    // retry spawn a new one every time (webrtcbin-0..6) exhausts threads -> GLib-ERROR aborts the
    // WebProcess before any frame encodes. Reuse one connection; give up after a few tries.
    if (activeCall){ try{activeCall.close();}catch(x){} activeCall=null; }
    if (++callAttempts > 6){
      if(retryTimer){clearInterval(retryTimer);retryTimer=null;}
      status("Couldn't connect after several tries — tap to retry.");
      return;
    }
    log("calling host " + HOST_ID + " (attempt " + callAttempts + ") …");
    var call = peer.call(HOST_ID, localStream);
    if (call) attach(call); else log("peer.call returned null");
  }
  function beGuest(){
    status("Connecting to the other person…");
    callAttempts=0;
    callHost();
    // Keep retrying until the media stream arrives (handles host-not-ready-yet / dropped signalling).
    if(!retryTimer) retryTimer=setInterval(function(){ if(!connected) callHost(); }, 3000);
  }

  var PEEROPTS = { config: { iceServers: [
    { urls: "stun:stun.l.google.com:19302" },
    { urls: "turn:openrelay.metered.ca:80",  username: "openrelayproject", credential: "openrelayproject" },
    { urls: "turn:openrelay.metered.ca:443", username: "openrelayproject", credential: "openrelayproject" },
    { urls: "turn:openrelay.metered.ca:443?transport=tcp", username: "openrelayproject", credential: "openrelayproject" }
  ] } };
  function startPeer(asHostId){
    log("startPeer(" + (asHostId||"random-guest") + ")");
    peer = asHostId ? new Peer(asHostId, PEEROPTS) : new Peer(PEEROPTS);
    peer.on("open", function(id){ log("peer open, myId=" + id); if(asHostId) beHost(); else beGuest(); });
    peer.on("disconnected", function(){ log("peer disconnected from broker; reconnecting"); try{peer.reconnect();}catch(e){} });
    peer.on("error", function(e){
      var ty = e && e.type; log("peer error: " + (ty||e));
      if (ty==="unavailable-id"){ try{peer.destroy();}catch(x){} startPeer(null); }       // host taken -> be guest
      else if (ty==="peer-unavailable"){ status("Waiting for the other person…"); }        // host not up yet; retry loop handles it
      else { status("Network problem: " + (ty||e)); }
    });
  }

  function getCam(){
    var md = navigator.mediaDevices;
    if (!md || !md.getUserMedia){ status("This browser can't open the camera (no getUserMedia)."); return; }
    // Pin to 320x240 @15fps. The 2011 Qualcomm OMX video component (gst-omx) ASSERTS/aborts the whole
    // WebProcess on a >320p reconfigure (documented in gstomxvideodec.c). WebRTC negotiates dynamic
    // resolution, so a hard 320-wide/240-tall cap on BOTH sides keeps every stream <=320p -> no >320p
    // reconfigure -> lets the hardware codec run without the crash. Also lighter for software fallback.
    md.getUserMedia({video:{width:{ideal:320,max:320},height:{ideal:240,max:240},frameRate:{ideal:15,max:20}}, audio:true}).then(function(s){
      localStream=s; var lv=$("local"); lv.srcObject=s; playEl(lv); log("camera OK");
      startPeer(HOST_ID);   // first to claim the host id hosts; the other becomes guest and calls it
    }).catch(function(e){ status("Camera/mic blocked: " + (e&&e.name||e)); });
  }

  $("hang").onclick=function(){ try{if(activeCall)activeCall.close();}catch(x){} try{if(peer)peer.destroy();}catch(x){}
    try{if(localStream)localStream.getTracks().forEach(function(t){t.stop();});}catch(x){} status("Call ended.");
    if(window.PalmSystem&&window.close){try{window.close();}catch(x){}} };
  $("mute").onclick=function(){ muted=!muted; if(localStream)localStream.getAudioTracks().forEach(function(t){t.enabled=!muted;});
    $("mute").textContent=muted?"Unmute":"Mute"; };
  $("camoff").onclick=function(){ camOff=!camOff; if(localStream)localStream.getVideoTracks().forEach(function(t){t.enabled=!camOff;});
    $("camoff").textContent=camOff?"Cam on":"Camera"; };
  $("dbgbtn").onclick=function(){ var d=$("dbg"); d.style.display=(d.style.display==="none"?"block":"none"); };

  document.addEventListener("click", function(){ var r=$("remote"),l=$("local"); if(r){ r.muted=false; if(r.srcObject)playEl(r); } if(l&&l.srcObject)playEl(l);
    if(!connected && peer && !peer.destroyed){ callAttempts=0; if(!retryTimer) retryTimer=setInterval(function(){ if(!connected) callHost(); }, 3000); callHost(); } }, false);
  window.addEventListener("resize", layout, false);
  window.addEventListener("orientationchange", function(){ setTimeout(layout,150); setTimeout(layout,600); }, false);
  layout(); setTimeout(layout,300); setTimeout(layout,1200);
  if (typeof Peer==="undefined"){ status("Failed to load call library (no network?)."); return; }
  log("peerjs loaded"); getCam();
})();
</script>
</body>
</html>
