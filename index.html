<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>webOS Video Call</title>
<style>
  html,body{margin:0;height:100%;background:#0f1115;color:#e8eaf0;
    font-family:-apple-system,Helvetica,Arial,sans-serif;overflow:hidden}
  #remote{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;background:#000}
  #local{position:absolute;right:10px;bottom:74px;width:140px;height:105px;object-fit:cover;
    background:#000;border:2px solid #2a2e37;border-radius:8px;z-index:2}
  #bar{position:absolute;left:0;bottom:0;width:100%;height:64px;background:rgba(16,18,24,.86);
    display:flex;align-items:center;justify-content:center;gap:12px;z-index:3}
  #status{position:absolute;top:0;left:0;width:100%;text-align:center;padding:10px 8px;
    font-size:15px;color:#e5c04f;background:rgba(16,18,24,.72);z-index:3}
  .btn{border:none;border-radius:24px;padding:11px 18px;font-size:15px;font-weight:600;color:#fff}
  #hang{background:#c0392b} #mute,#camoff,#dbgbtn{background:#333}
  #dbg{position:absolute;left:6px;bottom:70px;width:56%;max-height:44%;overflow:auto;z-index:4;
    font-family:monospace;font-size:11px;line-height:1.45;color:#8fe0a8;
    background:rgba(0,0,0,.6);border-radius:6px;padding:6px 8px;display:block;white-space:pre-wrap}
</style>
</head>
<body>
  <video id="remote" autoplay playsinline></video>
  <video id="local" autoplay playsinline muted></video>
  <div id="status">Starting…</div>
  <div id="dbg"></div>
  <div id="bar">
    <button id="mute" class="btn">Mute</button>
    <button id="camoff" class="btn">Camera</button>
    <button id="dbgbtn" class="btn">Log</button>
    <button id="hang" class="btn">Hang up</button>
  </div>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
(function(){
  var $ = function(id){ return document.getElementById(id); };
  var t0 = (typeof Date.now==="function") ? Date.now() : 0;
  function log(m){
    var d=$("dbg"); var s=(((typeof Date.now==="function"?Date.now():0)-t0)/1000).toFixed(1);
    d.textContent += "["+s+"s] "+m+"\n"; d.scrollTop=d.scrollHeight;
  }
  function status(t){ $("status").textContent=t; log("STATUS: "+t); }

  // Atlas MODE-1 gives the page a tall (~3072px) render buffer, so height:100% / bottom:0 land far
  // below the visible screen (the WIDTH stays the real device width; only the height is buffered).
  // Clamp the whole UI to a fixed-size box over the visible screen: 768 tall in landscape, 1024 in portrait.
  // In the 3072px buffer, a fixed element's bottom:0 = BUFFER bottom (off-screen); an explicit
  // top: value is measured from the (visible) top. So position everything with top, from a hardcoded
  // TouchPad screen height (768 landscape / 1024 portrait). screen.* is unreliable (returns the buffer).
  function set(id, css){ var e=$(id); if(!e) return; for(var k in css){ e.style[k]=css[k]; } }
  function layout(){
    var iw = window.innerWidth || 1024;
    var landscape = (typeof window.orientation === "number") ? (Math.abs(window.orientation) === 90) : (iw >= 896);
    var W = (iw >= 320 && iw <= 1200) ? iw : (landscape ? 1024 : 768);
    var H = landscape ? 768 : 1024;
    var barH = 64, pip = 105;
    var key = W+"x"+H;
    if (key === layout._last) { return; }   // no change -> don't re-write styles (breaks any resize->layout loop)
    layout._last = key;
    document.documentElement.style.height = H+"px";
    var b = document.body;
    b.style.position="fixed"; b.style.top="0px"; b.style.left="0px";
    b.style.width=W+"px"; b.style.height=H+"px"; b.style.overflow="hidden";
    set("remote",{position:"fixed", top:"0px", left:"0px", width:W+"px", height:H+"px"});
    set("status",{position:"fixed", top:"0px", left:"0px", width:W+"px"});
    set("bar",   {position:"fixed", left:"0px", top:(H-barH)+"px", bottom:"auto", width:W+"px"});
    set("local", {position:"fixed", right:"10px", top:(H-barH-pip-8)+"px", bottom:"auto"});
    set("dbg",   {position:"fixed", left:"6px", top:"46px", bottom:"auto", maxHeight:(H-barH-56)+"px"});
    set("err",   {position:"fixed", top:Math.round(H*0.42)+"px"});
    log("layout W="+W+" H="+H+" "+(landscape?"landscape":"portrait")+" (iw="+iw+" screen="+screen.width+"x"+screen.height+")");
  }

  // Room: prefer ?room= (survives app launch); fall back to #hash; then a shared lobby.
  function getRoom(){
    var q = (location.search||"").match(/[?&]room=([^&]+)/);
    if (q) return decodeURIComponent(q[1]).replace(/[^a-zA-Z0-9]/g,"");
    var h = (location.hash||"").replace(/^#/,"").replace(/[^a-zA-Z0-9]/g,"");
    return h || "webosVClobby";
  }
  var room = getRoom();
  var HOST_ID = "webosvc-" + room + "-host";
  log("url=" + location.href);
  log("room=" + room + "  hostId=" + HOST_ID);

  var localStream=null, peer=null, activeCall=null, muted=false, camOff=false, connected=false, retryTimer=null;

  function watchIce(call){
    try {
      var pc = call.peerConnection;
      if (pc) pc.oniceconnectionstatechange = function(){ var st=pc.iceConnectionState; log("ICE: "+st); if(!connected){ status("Connecting… (ICE "+st+")"); } if(st==="failed"){ status("Media FAILED (ICE failed) — likely different networks / TURN blocked"); } };
    } catch(e){}
  }
  function playEl(el){
    try { var pr = el.play(); if (pr && pr.catch) pr.catch(function(e){ log(el.id+" play() blocked: "+e.name+" (tap the screen)"); }); } catch(e){ log(el.id+" play err: "+e); }
  }
  function onStream(rs){
    var vt = rs.getVideoTracks ? rs.getVideoTracks() : [], at = rs.getAudioTracks ? rs.getAudioTracks() : [];
    log("remote stream: video="+vt.length+" audio="+at.length + (vt[0] ? (" enabled="+vt[0].enabled+" muted="+vt[0].muted+" state="+vt[0].readyState) : ""));
    connected=true; if(retryTimer){clearInterval(retryTimer);retryTimer=null;}
    var v = $("remote"); v.srcObject=rs;
    status("Connected — video="+vt.length+" audio="+at.length + (vt[0]&&vt[0].muted?" (video MUTED)":""));
    playEl(v);
    if (vt[0]) vt[0].onunmute = function(){ log("remote video unmuted"); playEl(v); };
  }
  function attach(call){
    activeCall=call; watchIce(call);
    call.on("stream", onStream);
    call.on("close", function(){ log("call closed"); if(!connected) status("Other side left."); });
    call.on("error", function(e){ log("call error: "+(e&&e.type||e)); });
  }

  function beHost(){
    status("Waiting for the other person to join…");
    log("hosting as " + HOST_ID);
    peer.on("call", function(call){ log("incoming call from "+call.peer); status("Someone joined — connecting media…"); call.answer(localStream); attach(call); });
  }
  function callHost(){
    if (connected) return;
    log("calling host " + HOST_ID + " …");
    var call = peer.call(HOST_ID, localStream);
    if (call) attach(call); else log("peer.call returned null");
  }
  function beGuest(){
    status("Connecting to the other person…");
    callHost();
    // Keep retrying until the media stream arrives (handles host-not-ready-yet / dropped signalling).
    if(!retryTimer) retryTimer=setInterval(function(){ if(!connected) callHost(); }, 3000);
  }

  var PEEROPTS = { config: { iceServers: [
    { urls: "stun:stun.l.google.com:19302" },
    { urls: "turn:openrelay.metered.ca:80",  username: "openrelayproject", credential: "openrelayproject" },
    { urls: "turn:openrelay.metered.ca:443", username: "openrelayproject", credential: "openrelayproject" },
    { urls: "turn:openrelay.metered.ca:443?transport=tcp", username: "openrelayproject", credential: "openrelayproject" }
  ] } };
  function startPeer(asHostId){
    log("startPeer(" + (asHostId||"random-guest") + ")");
    peer = asHostId ? new Peer(asHostId, PEEROPTS) : new Peer(PEEROPTS);
    peer.on("open", function(id){ log("peer open, myId=" + id); if(asHostId) beHost(); else beGuest(); });
    peer.on("disconnected", function(){ log("peer disconnected from broker; reconnecting"); try{peer.reconnect();}catch(e){} });
    peer.on("error", function(e){
      var ty = e && e.type; log("peer error: " + (ty||e));
      if (ty==="unavailable-id"){ try{peer.destroy();}catch(x){} startPeer(null); }       // host taken -> be guest
      else if (ty==="peer-unavailable"){ status("Waiting for the other person…"); }        // host not up yet; retry loop handles it
      else { status("Network problem: " + (ty||e)); }
    });
  }

  function getCam(){
    var md = navigator.mediaDevices;
    if (!md || !md.getUserMedia){ status("This browser can't open the camera (no getUserMedia)."); return; }
    // Cap resolution/framerate: the old WPE web-process can OOM-crash (-> Atlas reloads) on full-res
    // video. QVGA-ish @15fps is plenty for a call and much lighter to encode/decode.
    md.getUserMedia({video:{width:{ideal:480},height:{ideal:360},frameRate:{ideal:15,max:20}}, audio:true}).then(function(s){
      localStream=s; var lv=$("local"); lv.srcObject=s; playEl(lv); log("camera OK");
      startPeer(HOST_ID);   // first to claim the host id hosts; the other becomes guest and calls it
    }).catch(function(e){ status("Camera/mic blocked: " + (e&&e.name||e)); });
  }

  $("hang").onclick=function(){ try{if(activeCall)activeCall.close();}catch(x){} try{if(peer)peer.destroy();}catch(x){}
    try{if(localStream)localStream.getTracks().forEach(function(t){t.stop();});}catch(x){} status("Call ended.");
    if(window.PalmSystem&&window.close){try{window.close();}catch(x){}} };
  $("mute").onclick=function(){ muted=!muted; if(localStream)localStream.getAudioTracks().forEach(function(t){t.enabled=!muted;});
    $("mute").textContent=muted?"Unmute":"Mute"; };
  $("camoff").onclick=function(){ camOff=!camOff; if(localStream)localStream.getVideoTracks().forEach(function(t){t.enabled=!camOff;});
    $("camoff").textContent=camOff?"Cam on":"Camera"; };
  $("dbgbtn").onclick=function(){ var d=$("dbg"); d.style.display=(d.style.display==="none"?"block":"none"); };

  document.addEventListener("click", function(){ var r=$("remote"),l=$("local"); if(r&&r.srcObject)playEl(r); if(l&&l.srcObject)playEl(l); }, false);
  window.addEventListener("resize", layout, false);
  window.addEventListener("orientationchange", function(){ setTimeout(layout,150); setTimeout(layout,600); }, false);
  layout(); setTimeout(layout,300); setTimeout(layout,1200);
  if (typeof Peer==="undefined"){ status("Failed to load call library (no network?)."); return; }
  log("peerjs loaded"); getCam();
})();
</script>
</body>
</html>
